
<h2 class="sr-only">Sentire Payroll ESS login page redesign — mobile phone mockup with date of birth and PIN login modes</h2>

<div style="display:flex;justify-content:center;padding:1.5rem 0 2rem;background:var(--color-background-secondary);border-radius:var(--border-radius-lg)">
  <div style="width:340px;border-radius:40px;border:1.5px solid var(--color-border-secondary);overflow:hidden;background:#F8FAFC">

    <div style="background:#1E3A5F;display:flex;justify-content:space-between;align-items:center;padding:10px 22px 0">
      <span style="font-size:11px;color:rgba(255,255,255,0.5)">9:15 AM</span>
      <div style="display:flex;gap:5px;align-items:center">
        <i class="ti ti-wifi" style="font-size:12px;color:rgba(255,255,255,0.5)" aria-hidden="true"></i>
        <i class="ti ti-battery-2" style="font-size:12px;color:rgba(255,255,255,0.5)" aria-hidden="true"></i>
      </div>
    </div>

    <div style="background:#1E3A5F;padding:30px 24px 52px;text-align:center">
      <div style="width:64px;height:64px;border-radius:18px;background:rgba(255,255,255,0.1);border:1.5px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
        <span style="font-size:30px;font-weight:500;color:white;font-family:Georgia,serif">S</span>
      </div>
      <p style="color:white;font-size:19px;font-weight:500;margin:0 0 4px;letter-spacing:-0.2px">Sentire Payroll</p>
      <p style="color:rgba(255,255,255,0.45);font-size:12px;margin:0">Employee Self-Service</p>
    </div>

    <div style="background:white;border-radius:26px 26px 0 0;margin-top:-26px;padding:26px 22px 8px">

      <div style="display:grid;grid-template-columns:1fr 1fr;background:#F3F4F6;border-radius:11px;padding:3px;margin-bottom:22px">
        <button id="btn-dob" onclick="switchMode('dob')" style="border:none;background:#1E3A5F;color:white;font-size:12.5px;font-weight:500;padding:9px 4px;border-radius:9px;cursor:pointer">Date of Birth</button>
        <button id="btn-pin" onclick="switchMode('pin')" style="border:none;background:transparent;color:#9CA3AF;font-size:12.5px;font-weight:400;padding:9px 4px;border-radius:9px;cursor:pointer">PIN Login</button>
      </div>

      <div style="margin-bottom:14px">
        <label style="font-size:11px;font-weight:500;color:#6B7280;display:block;margin-bottom:5px">Company ID</label>
        <div style="position:relative">
          <i class="ti ti-building" style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;color:#9CA3AF" aria-hidden="true"></i>
          <input type="text" placeholder="e.g. acme" style="width:100%;box-sizing:border-box;border:1px solid #E5E7EB;border-radius:10px;padding:10px 12px 10px 34px;font-size:13px;color:#111827;background:#F9FAFB;outline:none">
        </div>
        <p style="font-size:10px;color:#9CA3AF;margin:3px 0 0">Tip: Your HR may have given you a direct company link</p>
      </div>

      <div style="margin-bottom:14px">
        <label style="font-size:11px;font-weight:500;color:#6B7280;display:block;margin-bottom:5px">Employee Number</label>
        <div style="position:relative">
          <i class="ti ti-id-badge" style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;color:#9CA3AF" aria-hidden="true"></i>
          <input type="text" placeholder="EMP-00001" style="width:100%;box-sizing:border-box;border:1px solid #E5E7EB;border-radius:10px;padding:10px 12px 10px 34px;font-size:13px;color:#111827;background:white;outline:none">
        </div>
      </div>

      <div id="sec-dob">
        <div style="margin-bottom:20px">
          <label style="font-size:11px;font-weight:500;color:#6B7280;display:block;margin-bottom:5px">Date of Birth</label>
          <div style="position:relative">
            <i class="ti ti-calendar" style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;color:#9CA3AF" aria-hidden="true"></i>
            <input type="date" style="width:100%;box-sizing:border-box;border:1px solid #E5E7EB;border-radius:10px;padding:10px 12px 10px 34px;font-size:13px;color:#111827;background:white;outline:none">
          </div>
        </div>
        <button style="width:100%;background:#1E3A5F;color:white;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:500;cursor:pointer;letter-spacing:0.2px">Log In</button>
      </div>

      <div id="sec-pin" style="display:none">
        <label style="font-size:11px;font-weight:500;color:#6B7280;display:block;margin-bottom:10px">Enter your 6-digit PIN</label>
        <div style="display:flex;justify-content:center;gap:11px;margin-bottom:18px;padding:6px 0" id="dots-row">
          <div class="pd" style="width:13px;height:13px;border-radius:50%;border:1.5px solid #D1D5DB;background:transparent"></div>
          <div class="pd" style="width:13px;height:13px;border-radius:50%;border:1.5px solid #D1D5DB;background:transparent"></div>
          <div class="pd" style="width:13px;height:13px;border-radius:50%;border:1.5px solid #D1D5DB;background:transparent"></div>
          <div class="pd" style="width:13px;height:13px;border-radius:50%;border:1.5px solid #D1D5DB;background:transparent"></div>
          <div class="pd" style="width:13px;height:13px;border-radius:50%;border:1.5px solid #D1D5DB;background:transparent"></div>
          <div class="pd" style="width:13px;height:13px;border-radius:50%;border:1.5px solid #D1D5DB;background:transparent"></div>
        </div>
        <div id="keypad" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px"></div>
        <button id="pin-go" disabled style="width:100%;background:#CBD5E1;color:white;border:none;border-radius:12px;padding:14px;font-size:14px;font-weight:500;cursor:not-allowed">Log In</button>
      </div>

      <div style="margin-top:20px;padding-top:16px;border-top:0.5px solid #F1F5F9;text-align:center">
        <p style="font-size:11px;color:#9CA3AF;margin:0 0 4px">New employee?</p>
        <p style="font-size:11px;color:#9CA3AF;margin:0">Ask your HR Admin to send your activation link.</p>
      </div>

    </div>

    <div style="background:white;padding:10px 0 16px;display:flex;justify-content:center">
      <div style="width:100px;height:4px;background:#E2E8F0;border-radius:2px"></div>
    </div>

  </div>
</div>

<script>
let pin = '';

function switchMode(m) {
  const dob = m === 'dob';
  document.getElementById('sec-dob').style.display = dob ? 'block' : 'none';
  document.getElementById('sec-pin').style.display = dob ? 'none' : 'block';
  ['dob','pin'].forEach(t => {
    const btn = document.getElementById('btn-' + t);
    const active = t === m;
    btn.style.background = active ? '#1E3A5F' : 'transparent';
    btn.style.color = active ? 'white' : '#9CA3AF';
    btn.style.fontWeight = active ? '500' : '400';
  });
  if (!dob && !document.getElementById('keypad').children.length) buildPad();
}

function buildPad() {
  const pad = document.getElementById('keypad');
  ['1','2','3','4','5','6','7','8','9','','0','back'].forEach(k => {
    const btn = document.createElement('button');
    btn.style.cssText = 'border:1px solid #E5E7EB;background:white;border-radius:12px;padding:14px 4px;font-size:19px;font-weight:500;color:#1E3A5F;cursor:pointer;line-height:1';
    if (k === '') {
      btn.disabled = true;
      btn.style.cssText = 'border:none;background:transparent;cursor:default;padding:14px 4px';
    } else if (k === 'back') {
      btn.innerHTML = '<i class="ti ti-backspace" style="font-size:20px;color:#6B7280" aria-label="Backspace"></i>';
      btn.onclick = () => { pin = pin.slice(0,-1); refresh(); };
    } else {
      btn.textContent = k;
      btn.onclick = () => { if (pin.length < 6) { pin += k; refresh(); } };
    }
    pad.appendChild(btn);
  });
}

function refresh() {
  document.querySelectorAll('.pd').forEach((d,i) => {
    d.style.background = i < pin.length ? '#1E3A5F' : 'transparent';
    d.style.borderColor = i < pin.length ? '#1E3A5F' : '#D1D5DB';
  });
  const go = document.getElementById('pin-go');
  const ready = pin.length === 6;
  go.disabled = !ready;
  go.style.background = ready ? '#1E3A5F' : '#CBD5E1';
  go.style.cursor = ready ? 'pointer' : 'not-allowed';
}
</script>
